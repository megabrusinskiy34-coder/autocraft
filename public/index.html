<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create AutoCraft | Redirecting...</title>
    <script>
        // Redirect to new ME Terminal
        window.location.href = '/me.html';
    </script>
    <style>
        body {
            background: #0a0e14;
            color: #4a90e2;
            font-family: sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }
        .loading {
            text-align: center;
        }
        .loading h1 {
            font-size: 24px;
            margin-bottom: 20px;
        }
        .spinner {
            border: 4px solid #2d3748;
            border-top: 4px solid #4a90e2;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            animation: spin 1s linear infinite;
            margin: 0 auto;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        a {
            color: #4a90e2;
            text-decoration: none;
            margin-top: 20px;
            display: block;
        }
    </style>
</head>
<body>
    <div class="loading">
        <h1>⚡ Redirecting to ME Terminal...</h1>
        <div class="spinner"></div>
        <p style="margin-top: 20px;">If not redirected, <a href="/me.html">click here</a></p>
    </div>
</body>
</html>
