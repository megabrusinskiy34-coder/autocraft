<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ME Terminal - Create AutoCraft</title>
    <link rel="stylesheet" href="me.css">
</head>
<body>
    <div class="me-container">
        <!-- Header -->
        <div class="me-header">
            <div class="me-title">
                <div class="gear-wrap">
                    <svg class="gear-icon" id="headerGear" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M12 8a4 4 0 1 0 0 8 4 4 0 0 0 0-8Z" stroke="#c9932e" stroke-width="1.6"/>
                        <path d="M12 1.5v3M12 19.5v3M4.2 4.2l2.1 2.1M17.7 17.7l2.1 2.1M1.5 12h3M19.5 12h3M4.2 19.8l2.1-2.1M17.7 6.3l2.1-2.1"
                              stroke="#c9932e" stroke-width="1.6" stroke-linecap="round"/>
                    </svg>
                </div>
                <div>
                    <h1>ME TERMINAL</h1>
                    <span class="subtitle">CREATE AUTOCRAFT INTERFACE</span>
                </div>
            </div>
            <div class="me-status">
                <div class="status-indicator" id="statusIndicator">
                    <span class="status-dot"></span>
                    <span id="statusText">OFFLINE</span>
                </div>
                <div class="me-stats">
                    <span class="stat-num" id="itemCount">0</span> items ·
                    <span class="stat-num" id="storageCount">0</span> storage units
                </div>
            </div>
        </div>

        <!-- Search Bar -->
        <div class="me-search">
            <div class="search-input-wrap">
                <input type="text" id="searchInput" placeholder="Search items..." autocomplete="off">
            </div>
            <div class="search-filters">
                <button class="filter-btn active" data-filter="all">All</button>
                <button class="filter-btn" data-filter="create">Create</button>
                <button class="filter-btn" data-filter="minecraft">Minecraft</button>
                <button class="filter-btn" data-filter="craftable">Craftable</button>
            </div>
        </div>

        <!-- Main Content -->
        <div class="me-main">
            <!-- Left: Item Grid -->
            <div class="me-grid-container">
                <div class="grid-header">
                    <span>Storage Inventory</span>
                    <span class="grid-count" id="gridCount">0 items</span>
                </div>
                <div class="me-item-grid" id="itemGrid">
                    <!-- Items will be inserted here -->
                </div>
            </div>

            <!-- Right: Details Panel -->
            <div class="me-details-panel">
                <div class="panel-header">Item Details</div>
                <div class="panel-content" id="detailsContent">
                    <div class="no-selection">
                        <span class="icon">📦</span>
                        <p>Select an item to view details</p>
                    </div>
                </div>
            </div>
        </div>

        <!-- Crafting Queue -->
        <div class="crafting-queue">
            <div class="queue-header">
                <span>⚙ Crafting Queue</span>
                <span class="queue-count" id="queueCount">0 active</span>
            </div>
            <div class="queue-list" id="queueList">
                <div class="queue-empty">No crafting jobs</div>
            </div>
        </div>
    </div>

    <!-- Craft Modal -->
    <div class="modal" id="craftModal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Craft Item</h2>
                <button class="close-btn" onclick="closeCraftModal()">×</button>
            </div>
            <div class="modal-body" id="craftModalBody">
                <!-- Content filled by JS -->
            </div>
        </div>
    </div>

    <!-- Toast Notifications -->
    <div id="toastContainer"></div>

    <script src="me.js"></script>
</body>
</html>
